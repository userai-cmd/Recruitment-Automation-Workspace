<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>BiG Dnipro - Кандидати</title>
    <link rel="stylesheet" href="/ui.css" />
    <style>
      .kpiRow{display:grid;grid-template-columns:repeat(4,minmax(160px,1fr));gap:14px;margin:0 0 16px}
      .kpi{border-radius:18px;padding:14px 16px;background:linear-gradient(180deg,rgba(8,20,38,0.82),rgba(5,14,28,0.92));
        border:1px solid rgba(116,198,255,0.22);box-shadow:inset 0 1px 0 rgba(255,255,255,0.03),0 18px 40px rgba(0,0,0,0.28)}
      .kpi .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
      .kpi .val{margin-top:6px;font-size:26px;font-weight:900;color:#fff;text-shadow:0 0 18px rgba(40,167,255,0.1)}

      .controls{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:16px}
      .chips{display:flex;gap:10px;flex-wrap:wrap}
      .chip{padding:9px 14px;border-radius:999px;border:1px solid rgba(103,181,255,0.18);background:rgba(5,14,26,0.54);
        color:#d9eeff;font-size:12px;font-weight:800;cursor:pointer;transition:.25s ease;text-transform:uppercase;letter-spacing:.5px}
      .chip:hover,.chip.active{border-color:rgba(123,207,255,0.44);background:linear-gradient(180deg,rgba(16,54,100,0.74),rgba(8,24,48,0.82));box-shadow:0 0 18px rgba(40,167,255,0.16);color:#fff}
      .search{flex:1;min-width:260px;display:flex;align-items:center;gap:10px;background:rgba(5,15,40,0.85);border:1px solid rgba(0,150,255,0.28);
        border-radius:12px;padding:11px 16px;backdrop-filter:blur(8px);transition:border-color .25s,box-shadow .25s}
      .search:focus-within{border-color:rgba(0,200,255,0.6);box-shadow:0 0 0 3px rgba(0,150,255,0.1),0 0 22px rgba(0,150,255,0.12)}
      .search svg{width:15px;height:15px;stroke:var(--muted);flex-shrink:0;fill:none}
      .search input{background:none;border:none;outline:none;color:var(--text);font-size:14px;width:100%;font-family:inherit}
      .search input::placeholder{color:var(--muted)}

      .btn{border:none;border-radius:14px;padding:12px 16px;font-size:13px;font-weight:900;cursor:pointer;color:#fff;
        background:linear-gradient(180deg,rgba(40,167,255,0.98),rgba(20,102,214,0.96));
        box-shadow:0 14px 30px rgba(30,99,230,0.25),0 0 22px rgba(62,151,255,0.22),inset 0 1px 0 rgba(255,255,255,0.18);text-transform:uppercase;letter-spacing:.4px}
      .btn.secondary{background:rgba(5,14,26,0.54);border:1px solid rgba(103,181,255,0.14);box-shadow:inset 0 1px 0 rgba(255,255,255,0.03),0 18px 40px rgba(0,0,0,0.28)}

      .board{display:flex;gap:14px;overflow-x:auto;padding-bottom:8px}
      .col{min-width:280px;max-width:280px;border-radius:22px;padding:14px;background:linear-gradient(180deg,rgba(8,20,38,0.82),rgba(5,14,28,0.92));
        border:1px solid rgba(116,198,255,0.22);box-shadow:inset 0 1px 0 rgba(255,255,255,0.03),0 18px 40px rgba(0,0,0,0.28)}
      .colHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
      .colTitle{font-size:13px;font-weight:900;letter-spacing:.5px;text-transform:uppercase}
      .count{font-size:11px;color:var(--muted)}
      .card{border-radius:18px;padding:12px 12px 10px;margin-bottom:12px;background:rgba(8,20,38,0.55);border:1px solid rgba(126,213,255,0.16);
        box-shadow:inset 0 0 18px rgba(40,167,255,0.03)}
      .name{font-weight:900;letter-spacing:.2px}
      .meta{margin-top:6px;font-size:12px;color:#c6d8ee;line-height:1.35;white-space:pre-wrap}
      .tags{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
      .tag{font-size:11px;padding:3px 8px;border-radius:999px;border:1px solid rgba(88,183,255,0.22);color:#a9d7ff;background:rgba(8,16,28,0.5)}
      .actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
      .actionBtn{padding:8px 10px;border-radius:12px;border:1px solid rgba(88,183,255,0.18);background:rgba(5,14,26,0.54);color:#d9eeff;
        cursor:pointer;font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.3px;transition:.25s ease}
      .actionBtn:hover{border-color:rgba(123,207,255,0.44);box-shadow:0 0 18px rgba(40,167,255,0.16);color:#fff}
      .muted{color:var(--muted);font-size:12px}

      .loading,.error{padding:10px 2px 0}
      .error{color:#ff8080;white-space:pre-wrap}

      @media(max-width:1180px){.kpiRow{grid-template-columns:repeat(2,minmax(0,1fr))}}
    </style>
  </head>
  <body>
    <div id="stars"></div>
    <div id="particles"></div>

    <div class="page">
      <div class="shell">
        <nav class="top-nav">
          <a class="brand" href="/">
            <img src="/big_dnipro_logo_final.png" alt="BiG Dnipro Logo" />
            <span class="brand-text">
              <span class="brand-title">BiG Dnipro</span>
              <span class="brand-subtitle">Automation Control Panel</span>
            </span>
          </a>
          <div class="nav-links">
            <a href="/">Головна</a>
            <a href="/candidate">Анкета кандидата</a>
            <a class="active" href="/dashboard">Кандидати</a>
            <a href="/dashboard">КПІ</a>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <div class="status-pill"><div class="status-dot"></div>Система активна</div>
            <div class="nav-clock">
              <div class="nav-clock-time" id="clock">--:--:--</div>
              <div class="nav-clock-date" id="clock-date">—</div>
            </div>
            <button class="btn secondary" id="logoutBtn" type="button">Logout</button>
          </div>
        </nav>

        <section class="hero">
          <div class="core-wrap" aria-hidden="true">
            <div class="core-eye"><div class="outer"></div><div class="mid"></div></div>
          </div>
          <div class="hero-content">
            <div class="eyebrow">Recruitment Automation Workspace</div>
            <h1 class="title">Кандидати</h1>
            <p class="subtitle" id="subline">Завантаження...</p>
          </div>
        </section>

        <div class="kpiRow">
          <div class="kpi"><div class="lbl">Всього кандидатів</div><div id="kpiTotal" class="val">0</div></div>
          <div class="kpi"><div class="lbl">Нові</div><div id="kpiNew" class="val">0</div></div>
          <div class="kpi"><div class="lbl">На оформленні</div><div id="kpiOffer" class="val">0</div></div>
          <div class="kpi"><div class="lbl">Оформлені</div><div id="kpiHired" class="val">0</div></div>
        </div>

        <div class="controls">
          <div class="chips">
            <button class="chip active" data-filter="all" type="button">Всі</button>
            <button class="chip" data-filter="noResponse3d" type="button">Без відповіді 3 дні</button>
            <button class="chip" data-filter="hot" type="button">Гарячі</button>
            <button class="chip" data-filter="inProgress" type="button">На оформленні</button>
          </div>
          <div class="search">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
            <input id="searchInput" type="text" placeholder="Пошук: ПІБ або телефон" />
          </div>
          <a class="btn" href="/candidate">+ Новий кандидат</a>
        </div>

        <div class="board" id="board"></div>

        <div id="loading" class="loading">Завантажую кандидатів...</div>
        <div id="error" class="error" style="display:none"></div>
      </div>
    </div>

    <script src="/ui.js"></script>
    <script src="/app.js"></script>
    <script>
      window.UI?.initStarsAndParticles();
      window.UI?.initClock();
      window.UI?.setActiveNav('/dashboard');
    </script>
  </body>
</html>
