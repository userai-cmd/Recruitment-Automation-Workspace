<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>SAT_Recrut - Користувачі</title>
    <link rel="stylesheet" href="/ui.css" />
    <style>
      .panel{border-radius:18px;padding:14px;border:1px solid rgba(116,198,255,.22);background:linear-gradient(180deg,rgba(8,20,38,.82),rgba(5,14,28,.92))}
      .panel + .panel{margin-top:12px}
      .formGrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
      .field{display:grid;gap:6px}
      .field input,.field select{border:1px solid rgba(103,181,255,.22);border-radius:10px;background:rgba(5,14,26,.6);color:#d9eeff;padding:8px 10px}
      .btn{border:1px solid rgba(103,181,255,.22);border-radius:10px;background:rgba(5,14,26,.6);color:#d9eeff;padding:8px 10px;font-weight:800;cursor:pointer}
      .btn.primary{background:linear-gradient(180deg,rgba(40,167,255,.98),rgba(20,102,214,.96))}
      table{width:100%;border-collapse:collapse}
      th,td{padding:10px 8px;border-bottom:1px solid rgba(126,213,255,.12);font-size:13px;text-align:left}
      th{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px}
      .tag{padding:2px 8px;border-radius:999px;font-size:11px;border:1px solid rgba(126,213,255,.3)}
      .ok{color:#95f7c0}.off{color:#ffb1b1}
      @media(max-width:980px){.formGrid{grid-template-columns:1fr 1fr}}
      @media(max-width:720px){.formGrid{grid-template-columns:1fr}}
    </style>
  </head>
  <body>
    <div id="stars"></div>
    <div id="particles"></div>
    <div class="page">
      <div class="shell">
        <nav class="top-nav">
          <a class="brand" href="/home"><span class="brand-text"><span class="brand-title">SAT_Recrut</span><span class="brand-subtitle">SAT Recruitment Platform</span></span></a>
          <div class="page-mini-title">Користувачі</div>
          <div style="display:flex;align-items:center;gap:10px">
            <div class="status-pill"><div class="status-dot"></div>Система активна</div>
            <button class="theme-toggle" data-theme-toggle type="button">Soft</button>
            <div class="nav-clock">
              <div class="nav-clock-time" id="clock">--:--:--</div>
              <div class="nav-clock-date" id="clock-date">—</div>
            </div>
            <div class="profile-menu">
              <button class="profile-btn" id="profileBtn" type="button">
                <div class="profile-avatar" id="profileAvatar">?</div>
                <span class="profile-btn-name" id="profileBtnName">Профіль</span>
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
              </button>
              <div class="profile-dropdown" id="profileDropdown">
                <div class="profile-dd-header">
                  <div class="profile-dd-name" id="profileDdName">—</div>
                  <div class="profile-dd-role" id="profileDdRole">—</div>
                </div>
                <button class="profile-dd-item danger" id="logoutBtn" type="button">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                  Вийти
                </button>
              </div>
            </div>
          </div>
        </nav>
        <aside class="left-nav">
          <div class="left-nav-title"><span class="sat-main">SAT</span><span class="sat-sub">Recruitment Platform</span></div>
          <div class="nav-links">
            <a href="/home">Головна</a>
            <a href="/candidate">Анкета кандидата</a>
            <a href="/dashboard">Кандидати</a>
            <a href="/kpi">КПІ</a>
            <a href="/motivation">Мотивація</a>
            <a class="active" href="/users">Користувачі</a>
          </div>
        </aside>
        <section class="hero">
          <div class="hero-content">
            <div class="eyebrow">SAT_RECRUT</div>
            <div class="hero-line"></div>
            <span class="hero-page-label">Користувачі</span>
          </div>
        </section>
        <div class="panel">
          <form id="createUserForm" class="formGrid">
            <label class="field">Email<input id="uEmail" type="email" required /></label>
            <label class="field">ПІБ<input id="uName" type="text" required /></label>
            <label class="field">Пароль<input id="uPassword" type="text" minlength="6" required /></label>
            <label class="field">Роль<select id="uRole"><option value="recruiter">recruiter</option><option value="admin">admin</option></select></label>
            <button class="btn primary" type="submit">Створити</button>
          </form>
        </div>
        <div class="panel">
          <table>
            <thead><tr><th>ПІБ</th><th>Email</th><th>Роль</th><th>Статус</th><th>Дія</th></tr></thead>
            <tbody id="usersBody"></tbody>
          </table>
        </div>
      </div>
    </div>
    <script src="/ui.js"></script>
    <script>
      function token() { return localStorage.getItem('accessToken') || ''; }
      async function api(path, options = {}) {
        const res = await fetch(path, {
          ...options,
          headers: { ...(options.body ? { 'Content-Type': 'application/json' } : {}), Authorization: `Bearer ${token()}` },
        });
        if (res.status === 401) { localStorage.removeItem('accessToken'); window.location.href = '/'; throw new Error('401'); }
        if (!res.ok) throw new Error(await res.text() || `${res.status}`);
        return res.json();
      }
      async function loadUsers() {
        const me = await api('/auth/me');
        document.getElementById('subline').textContent = `Ви: ${me.email} (${me.role})`;
        if (me.role !== 'admin') {
          document.getElementById('usersBody').innerHTML = '<tr><td colspan="5">Доступ лише для admin.</td></tr>';
          return;
        }
        const users = await api('/auth/users');
        document.getElementById('usersBody').innerHTML = users.map((u) => `
          <tr>
            <td>${u.fullName || '-'}</td>
            <td>${u.email}</td>
            <td><span class="tag">${u.role}</span></td>
            <td><span class="${u.isActive ? 'ok' : 'off'}">${u.isActive ? 'active' : 'inactive'}</span></td>
            <td><button class="btn" data-id="${u.id}" data-active="${u.isActive ? '1' : '0'}">${u.isActive ? 'Деактивувати' : 'Активувати'}</button></td>
          </tr>
        `).join('');
        document.querySelectorAll('#usersBody button[data-id]').forEach((btn) => {
          btn.addEventListener('click', async () => {
            const id = btn.getAttribute('data-id');
            const active = btn.getAttribute('data-active') === '1';
            await api(`/auth/users/${id}/active`, { method: 'PATCH', body: JSON.stringify({ isActive: !active }) });
            await loadUsers();
          });
        });
      }
      document.getElementById('createUserForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        await api('/auth/users', {
          method: 'POST',
          body: JSON.stringify({
            email: document.getElementById('uEmail').value,
            fullName: document.getElementById('uName').value,
            password: document.getElementById('uPassword').value,
            role: document.getElementById('uRole').value,
          }),
        });
        e.target.reset();
        await loadUsers();
      });
      window.UI?.initStarsAndParticles();
      window.UI?.initClock();
      window.UI?.setActiveNav('/users');
      window.UI?.initThemeToggle();
      window.UI?.hideUsersNavForRecruiter?.();
      loadUsers();
    </script>
  </body>
</html>
